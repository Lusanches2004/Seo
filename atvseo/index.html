

<!DOCTYPE html>
<html lang="pt-BR">
<!-- Janine Vandy e Luis Henrique Sanches -->
<head>
    <meta charset="UTF-8">

    <!-- RESPONSIVIDADE -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    <meta name="description" content="Página de login DevClub para acesso à plataforma de programação e desenvolvimento.">
    <meta name="keywords" content="devclub, login, programação, desenvolvedor, acesso, plataforma devclub">
    <meta name="author" content="DevClub">
    <meta name="robots" content="index, follow">

    <title>DevClub Login</title>

    <!-- ÍCONES -->
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- IMAGEM COM ALT (SEO + ACESSIBILIDADE) -->
    <img src="./img/imagem.jpg" alt="Imagem de fundo com paisagem natural usada no layout do login DevClub" style="display:none;">

    <main class="container">

        <form>

            <h1>Login DevClub</h1>

            <div class="input-box">
                <input type="email" placeholder="Usuário" required>
                <i class='bx bxs-user'></i>
            </div>

            <div class="input-box">
                <input type="password" placeholder="Senha" required>
                <i class='bx bxs-lock-alt'></i>
            </div>

            <div class="remember-forgot">

                <label>
                    <input type="checkbox">
                    Lembrar senha
                </label>

                <a href="#">Esqueci a senha</a>

            </div>

            <button type="submit" class="Entrar">
                Entrar
            </button>

            <div class="register-link">
                <p>Não tem uma conta? <a href="#">Registrar-se</a></p>
            </div>

        </form>

    </main>

</body>

</html>
